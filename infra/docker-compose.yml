x-default-logging: &default-logging
  driver: local
  options:
    max-size: "10m"
    max-file: "3"

services:
  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    container_name: hotspot-clickhouse
    restart: "no"
    stop_grace_period: 2m
    env_file:
      - ../.env
    environment:
      TZ: Asia/Shanghai
    ulimits:
      core: 0
    ports:
      - '127.0.0.1:8123:8123'
      - '127.0.0.1:9000:9000'
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - clickhouse-system-part-log:/var/lib/clickhouse/store/24c/24c2bf8d-37ed-4f7e-90b8-75717be87350
      - clickhouse-system-asynchronous-metric-log:/var/lib/clickhouse/store/7c5/7c5a2d48-7106-4cc3-9184-887f2ffa8205
      - ./clickhouse/init.sh:/docker-entrypoint-initdb.d/00-init.sh:ro
      - ./clickhouse/init.sql:/docker-entrypoint-initdb.d/10-schema.sql:ro
      - ./clickhouse/disable-problematic-system-logs.xml:/etc/clickhouse-server/config.d/disable-problematic-system-logs.xml:ro
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --query 'SELECT 1' >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    logging: *default-logging

  postgres:
    image: postgres:16
    container_name: hotspot-postgres
    restart: unless-stopped
    stop_grace_period: 1m
    env_file:
      - ../.env
    ports:
      - '127.0.0.1:5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    logging: *default-logging

  api:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: hotspot-api
    restart: unless-stopped
    command: sh -lc 'export POSTGRES_URL="postgres://$${POSTGRES_USER:?missing}:$${POSTGRES_PASSWORD:?missing}@postgres:5432/$${POSTGRES_DB:-hotspot}"; npm run start:api'
    env_file:
      - ../.env
    ports:
      - '${API_PORT_MAPPING:-127.0.0.1:3000:3000}'
    environment:
      NODE_ENV: production
      PORT: 3000
      TZ: Asia/Shanghai
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: 8123
      CLICKHOUSE_DB: hotspot
      MCP_BASE_URL: http://mcp-server:3100/mcp
      MCP_INTERNAL_TOKEN: ${MCP_INTERNAL_TOKEN:-dev-hotspot-mcp-token}
      AGGREGATOR_LOOKBACK_HOURS: 6
      AGGREGATOR_INTERVAL_MS: 300000
      DETECTOR_INTERVAL_MS: 300000
      PULLER_INTERVAL_MS: 86400000
    dns:
      - 1.1.1.1
      - 8.8.8.8
    depends_on:
      clickhouse:
        condition: service_healthy
      postgres:
        condition: service_started
      mcp-server:
        condition: service_started
    logging: *default-logging

  mcp-server:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: hotspot-mcp-server
    restart: unless-stopped
    command: sh -lc 'export POSTGRES_URL="postgres://$${POSTGRES_USER:?missing}:$${POSTGRES_PASSWORD:?missing}@postgres:5432/$${POSTGRES_DB:-hotspot}"; npm run start:mcp-server'
    env_file:
      - ../.env
    environment:
      NODE_ENV: production
      TZ: Asia/Shanghai
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: 8123
      CLICKHOUSE_DB: hotspot
      MCP_BIND_HOST: 0.0.0.0
      MCP_PORT: 3100
      MCP_BASE_URL: http://mcp-server:3100/mcp
      MCP_INTERNAL_TOKEN: ${MCP_INTERNAL_TOKEN:-dev-hotspot-mcp-token}
    depends_on:
      clickhouse:
        condition: service_healthy
      postgres:
        condition: service_started
    logging: *default-logging

  aggregator:
