      context: ..
      dockerfile: Dockerfile
    container_name: hotspot-keyword-engine
    restart: unless-stopped
    command: sh -lc 'export POSTGRES_URL="postgres://$${POSTGRES_USER:?missing}:$${POSTGRES_PASSWORD:?missing}@postgres:5432/$${POSTGRES_DB:-hotspot}"; npm run start:keyword-engine'
    env_file:
