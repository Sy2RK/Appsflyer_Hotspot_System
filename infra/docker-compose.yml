services:
  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    container_name: hotspot-clickhouse
    restart: unless-stopped
    env_file:
      - ../.env
    ports:
      - '127.0.0.1:8123:8123'
      - '127.0.0.1:9000:9000'
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - ./clickhouse/init.sh:/docker-entrypoint-initdb.d/00-init.sh:ro
      - ./clickhouse/init.sql:/docker-entrypoint-initdb.d/10-schema.sql:ro

  postgres:
    image: postgres:16
    container_name: hotspot-postgres
    restart: unless-stopped
    env_file:
      - ../.env
    ports:
      - '127.0.0.1:5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  api:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: hotspot-api
    restart: unless-stopped
    command: sh -lc 'export POSTGRES_URL="postgres://$${POSTGRES_USER:?missing}:$${POSTGRES_PASSWORD:?missing}@postgres:5432/$${POSTGRES_DB:-hotspot}"; npm run start:api'
    env_file:
      - ../.env
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: production
      PORT: 3000
      TZ: Asia/Shanghai
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: 8123
      CLICKHOUSE_DB: hotspot
      AGGREGATOR_LOOKBACK_HOURS: 6
      AGGREGATOR_INTERVAL_MS: 300000
      DETECTOR_INTERVAL_MS: 300000
      PULLER_INTERVAL_MS: 86400000
    dns:
      - 1.1.1.1
      - 8.8.8.8
    depends_on:
      - clickhouse
      - postgres

  aggregator:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: hotspot-aggregator
    restart: unless-stopped
    command: sh -lc 'export POSTGRES_URL="postgres://$${POSTGRES_USER:?missing}:$${POSTGRES_PASSWORD:?missing}@postgres:5432/$${POSTGRES_DB:-hotspot}"; npm run start:aggregator'
    env_file:
      - ../.env
    environment:
      NODE_ENV: production
      TZ: Asia/Shanghai
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: 8123
      CLICKHOUSE_DB: hotspot
      AGGREGATOR_LOOKBACK_HOURS: 6
      AGGREGATOR_INTERVAL_MS: 300000
    depends_on:
      - clickhouse
      - postgres

  detector:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: hotspot-detector
    restart: unless-stopped
    command: sh -lc 'export POSTGRES_URL="postgres://$${POSTGRES_USER:?missing}:$${POSTGRES_PASSWORD:?missing}@postgres:5432/$${POSTGRES_DB:-hotspot}"; npm run start:detector'
    env_file:
      - ../.env
    environment:
      NODE_ENV: production
      TZ: Asia/Shanghai
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: 8123
      CLICKHOUSE_DB: hotspot
      DETECTOR_INTERVAL_MS: 300000
    dns:
      - 1.1.1.1
      - 8.8.8.8
    depends_on:
      - clickhouse
      - postgres

  puller:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: hotspot-puller
    restart: unless-stopped
    command: sh -lc 'export POSTGRES_URL="postgres://$${POSTGRES_USER:?missing}:$${POSTGRES_PASSWORD:?missing}@postgres:5432/$${POSTGRES_DB:-hotspot}"; npm run start:puller'
    env_file:
      - ../.env
    environment:
      NODE_ENV: production
      TZ: Asia/Shanghai
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: 8123
      CLICKHOUSE_DB: hotspot
      PULLER_INTERVAL_MS: 86400000
      PULLER_BACKFILL_DAYS: ${PULLER_BACKFILL_DAYS:-3}
    dns:
      - 1.1.1.1
      - 8.8.8.8
    depends_on:
      - clickhouse
      - postgres

  keyword-engine:
