      ASA_KEYWORD_BACKFILL_DAYS: ${ASA_KEYWORD_BACKFILL_DAYS:-14}
      ASA_KEYWORD_RUN_ON_BOOT: ${ASA_KEYWORD_RUN_ON_BOOT:-false}
      ASA_KEYWORD_REQUEST_INTERVAL_MS: ${ASA_KEYWORD_REQUEST_INTERVAL_MS:-1200}
    dns:
      - 1.1.1.1
      - 8.8.8.8
    depends_on:
      - clickhouse
      - postgres

  asa-daily-brief:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: hotspot-asa-daily-brief
