services:
  api:
    ports: !override
      - '127.0.0.1:3000:3000'

  caddy:
    image: caddy:2-alpine
    container_name: hotspot-caddy
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - '80:80'
      - '443:443'
    environment:
      HOTSPOT_DOMAIN: ${HOTSPOT_DOMAIN:?missing}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config

volumes:
  caddy-data:
  caddy-config:
