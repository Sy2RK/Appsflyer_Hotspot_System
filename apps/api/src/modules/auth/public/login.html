<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hotspot 登录</title>
    <link rel="stylesheet" href="/login-assets/login.css" />
  </head>
  <body>
    <main class="login-shell">
      <section class="login-stage">
        <div class="login-stage-copy">
          <p class="login-kicker">AppsFlyer Hotspot</p>
          <h1>增长监测与投放控制台</h1>
          <p class="login-lead">
            围绕 AppsFlyer 数据拉取、ASA 关键词管理、预算建议、每日简报与 Feishu 多维表格导出的一体化运营系统。
          </p>
          <div class="login-feature-list">
            <article class="login-feature-card">
              <strong>数据监测</strong>
              <span>覆盖 Pull 明细、指标趋势、关键词生命周期、ASA 关键词与预算建议。</span>
            </article>
            <article class="login-feature-card">
              <strong>自动推送</strong>
              <span>统一管理通用日报、ASA 简报与 Feishu 多维表格原始数据导出。</span>
            </article>
          </div>
        </div>

        <div class="login-card">
          <div class="login-card-head">
            <p class="login-card-kicker">控制台入口</p>
            <h2>登录 Hotspot</h2>
            <p>请输入管理员提供的账号与密码，进入项目控制台。</p>
          </div>

          <form id="loginForm" class="login-form" autocomplete="off">
            <label class="login-field">
              <span>账号</span>
              <input id="loginAccountInput" name="account" type="text" autocomplete="username" />
            </label>
            <label class="login-field">
              <span>密码</span>
              <input id="loginPasswordInput" name="password" type="password" autocomplete="current-password" placeholder="请输入管理员密码" />
            </label>
            <button id="loginSubmitBtn" class="login-submit" type="submit">进入控制台</button>
          </form>

          <div id="loginStatus" class="login-status">登录后会自动跳转到当前目标页面。</div>
        </div>
      </section>
    </main>
    <script src="/login-assets/login.js"></script>
  </body>
  </html>
